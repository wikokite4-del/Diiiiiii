<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дія</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #D6EAF8 0%, #FFFFFF 100%);
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0;
            background: var(--bg-gradient);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* Екран авторизації (PIN) */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 2000; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .pin-dot { width: 14px; height: 14px; border: 1.5px solid #D1D1D6; border-radius: 50%; margin: 0 10px; }

        /* Шапка */
        .header {
            padding: 55px 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 32px; font-weight: 700; margin: 0; }
        .user-icon { width: 44px; height: 44px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* Контейнер картки */
        .content { padding: 10px 16px; perspective: 1000px; }
        .diia-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        /* Смуга сканування */
        .scan-bar {
            position: absolute; left: 0; width: 100%; height: 3px;
            background: #00FF95; box-shadow: 0 0 15px #00FF95;
            animation: moveScan 3s infinite ease-in-out;
            opacity: 0.6;
        }
        @keyframes moveScan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .photo-area { width: 115px; height: 155px; background: #F2F2F7; border-radius: 18px; background-size: cover; background-position: center; }
        
        .info-block label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 2px; }
        .info-block p { font-size: 18px; font-weight: 700; margin: 0 0 14px 0; color: var(--text-main); }

        /* Нижня панель */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 88px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            display: flex; border-top: 0.5px solid #C6C6C8; padding-bottom: 25px;
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #8E8E93; }
        .tab-item.active { color: #000; }

        /* Адмінка (Шторка) */
        #editor {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #fff; border-radius: 30px 30px 0 0;
            padding: 30px 20px; transition: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 3000; box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
        }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 16px; border: 1.5px solid #F2F2F7; border-radius: 14px; background: #F2F2F7; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <img src="https://diia.gov.ua/img/logo.svg" width="90">
    <p style="margin-top:50px; font-size:18px; color:#000;">Введіть код для входу</p>
    <div style="display:flex; margin-top:20px;">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <button onclick="document.getElementById('auth-screen').style.display='none'" style="margin-top:100px; border:none; background:none; color:#007AFF; font-size:17px; font-weight:600;">Увійти</button>
</div>

<div class="header">
    <h1>Документи</h1>
    <div class="user-icon" onclick="openEditor()">👤</div>
</div>

<div class="content">
    <div class="diia-card" onclick="toggleQR()">
        <div class="scan-bar"></div>
        <div style="display:flex; gap:20px;">
            <div id="display-photo" class="photo-area"></div>
            <div class="info-block">
                <label>Прізвище</label>
                <p id="txt-surname">ШЕВЧЕНКО</p>
                <label>Ім’я</label>
                <p id="txt-name">ТАРАС</p>
                <label>По батькові</label>
                <p id="txt-midname">ГРИГОРОВИЧ</p>
            </div>
        </div>
        <div style="margin-top:15px; border-top: 1px solid #F2F2F7; padding-top:10px; display:flex; justify-content:space-between;">
            <span style="color:#8E8E93; font-size:14px;">е-Паспорт</span>
            <span style="font-weight:700;">● ● ●</span>
        </div>
    </div>
</div>

<div id="editor">
    <h2 style="margin-top:0;">Налаштування</h2>
    <input type="text" id="in-surname" placeholder="Прізвище" style="margin-bottom:10px;">
    <input type="text" id="in-name" placeholder="Ім'я" style="margin-bottom:10px;">
    <input type="text" id="in-midname" placeholder="По батькові" style="margin-bottom:10px;">
    <input type="file" id="in-file" onchange="processFile(this)" style="margin-bottom:20px; background:none; padding:0;">
    <button onclick="saveData()" style="width:100%; padding:18px; background:#000; color:#fff; border:none; border-radius:16px; font-size:16px; font-weight:700;">Зберегти зміни</button>
</div>

<div class="tab-bar">
    <div class="tab-item active"><span style="font-size:24px;">🏠</span><span>Документи</span></div>
    <div class="tab-item"><span style="font-size:24px;">📊</span><span>Послуги</span></div>
    <div class="tab-item"><span style="font-size:24px;">🔔</span><span>Повідомлення</span></div>
    <div class="tab-item" onclick="openEditor()"><span style="font-size:24px;">⚙️</span><span>Меню</span></div>
</div>

<script>
    function openEditor() { document.getElementById('editor').style.bottom = '0'; }
    function saveData() {
        document.getElementById('txt-surname').innerText = document.getElementById('in-surname').value.toUpperCase() || "ШЕВЧЕНКО";
        document.getElementById('txt-name').innerText = document.getElementById('in-name').value.toUpperCase() || "ТАРАС";
        document.getElementById('txt-midname').innerText = document.getElementById('in-midname').value.toUpperCase() || "ГРИГОРОВИЧ";
        document.getElementById('editor').style.bottom = '-100%';
    }
    function processFile(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) { document.getElementById('display-photo').style.backgroundImage = 'url('+e.target.result+')'; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    // Подвійний клік по фону теж відкриває налаштування
    document.body.addEventListener('dblclick', function(e) { if(e.target === document.body) openEditor(); });
</script>

</body>
</html>
