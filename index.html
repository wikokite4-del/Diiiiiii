<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дія</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="admin-panel" style="display: none;">
    <h3>⚙️ КЕРУВАННЯ ДАНИМИ</h3>
    <input type="text" id="input-last-name" placeholder="Прізвище" oninput="updateCard()">
    <input type="text" id="input-first-name" placeholder="Ім'я" oninput="updateCard()">
    <input type="text" id="input-dob" placeholder="Дата народження" oninput="updateCard()">
    <input type="text" id="input-doc-num" placeholder="Номер документа" oninput="updateCard()">
    <input type="file" id="upload-photo" onchange="previewPhoto(this)">
    <button onclick="toggleAdmin()" style="background: #007aff; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px;">ЗБЕРЕГТИ ТА ЗАКРИТИ</button>
</div>

<div class="app-screen">
    <div class="id-card">
        <div class="header">
            <div class="logo">Дія</div>
            <div id="live-time" style="color: #00ffaa; font-family: monospace;"></div>
        </div>
        
        <div class="card-content">
            <div id="user-photo" class="photo-box"></div>
            <div class="info">
                <div class="field"><label>Прізвище</label><div id="card-last-name">ШЕВЧЕНКО</div></div>
                <div class="field"><label>Ім'я ПО БАТЬКОВІ</label><div id="card-first-name">ТАРАС ГРИГОРОВИЧ</div></div>
                <div class="row">
                    <div class="field"><label>Дата народж.</label><div id="card-dob">09.03.1814</div></div>
                    <div class="field"><label>Стать</label><div>Ч/M</div></div>
                </div>
                <div class="doc-num">№ <span id="card-doc-num">123456789</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Оновлення тексту на картці
    function updateCard() {
        document.getElementById('card-last-name').innerText = document.getElementById('input-last-name').value.toUpperCase() || "ШЕВЧЕНКО";
        document.getElementById('card-first-name').innerText = document.getElementById('input-first-name').value.toUpperCase() || "ТАРАС ГРИГОРОВИЧ";
        document.getElementById('card-dob').innerText = document.getElementById('input-dob').value || "09.03.1814";
        document.getElementById('card-doc-num').innerText = document.getElementById('input-doc-num').value || "123456789";
    }

    // Завантаження фото
    function previewPhoto(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('user-photo').style.backgroundImage = 'url(' + e.target.result + ')';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Годинник
    setInterval(() => {
        let now = new Date();
        let h = str_pad(now.getHours());
        let m = str_pad(now.getMinutes());
        let s = str_pad(now.getSeconds());
        document.getElementById('live-time').innerText = h + ":" + m + ":" + s;
    }, 1000);

    function str_pad(n) { return n < 10 ? '0' + n : n; }

    // Виклик адмінки ПОДВІЙНИМ ТАПОМ
    document.body.addEventListener('dblclick', function () {
        toggleAdmin();
    });

    function toggleAdmin() {
        let panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
    }
</script>

</body>
</html>
